  # RaedMughaus/whisper-large-v3-finetuned-cv-corpus-24-ar - LoRA adapter on whisper-large-v3
  whisper-lora-arabic:
    profiles: ["whisper-lora-arabic"]
    build:
      context: .
      dockerfile: Dockerfile.whisper-lora
    command:
      [
        "python",
        "scripts/whisper_lora_wrapper.py",
        "--listen-host",
        "0.0.0.0",
        "--listen-port",
        "8099",
        "--base-model",
        "openai/whisper-large-v3",
        "--adapter",
        "RaedMughaus/whisper-large-v3-finetuned-cv-corpus-24-ar",
