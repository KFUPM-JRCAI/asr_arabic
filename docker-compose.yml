  # facebook/omniASR-LLM-1B - Meta's omnilingual ASR model
  omniasr:
    profiles: ["omniasr"]
    build:
      context: .
      dockerfile: Dockerfile.omniasr
    command:
      [
        "python",
        "scripts/omniasr_wrapper.py",
        "--listen-host",
        "0.0.0.0",
        "--listen-port",
        "8099",
        "--model",
        "facebook/omniASR-LLM-1B",
        "--model-card",
        "omniASR_LLM_1B",
        "--language",
        "ar",
      ]
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      WRAPPER_AUTH_TOKEN: ${WRAPPER_AUTH_TOKEN:-}
    ports:
      - "${OMNIASR_HOST_PORT:-8094}:8099"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - fairseq2_cache:/root/.cache/fairseq2
      - ./:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 8GB

  # UsefulSensors/moonshine-base-ar - Moonshine Base Arabic ASR model
  moonshine:
