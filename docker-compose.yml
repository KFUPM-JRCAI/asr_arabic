        "0.0.0.0",
        "--listen-port",
        "8099",
        "--model",
        "KFUPM-JRCAI/WhisperTurboArabic_v2",
        "--language",
        "ar",
      ]
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      WRAPPER_AUTH_TOKEN: ${WRAPPER_AUTH_TOKEN:-}
