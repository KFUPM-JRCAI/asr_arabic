    shm_size: 8GB

  # KFUPM-JRCAI/WhisperArabic_v4 - fine-tuned Whisper Large v3 for Arabic (CTranslate2/faster-whisper)
  whisper-arabic-v4:
    profiles: ["whisper-arabic-v4"]
