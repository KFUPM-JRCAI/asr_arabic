services:
  speaches:
    image: ${SPEACHES_IMAGE:-ghcr.io/speaches-ai/speaches:latest-cuda}
    ports:
      - "${SPEACHES_HOST_PORT:-8099}:8000"
    volumes:
      - hf_cache:/home/ubuntu/.cache/huggingface/hub
    gpus: all

  leaderboard:
    build: .
    ports:
      - "${LEADERBOARD_HOST_PORT:-17860}:7860"
    environment:
      SPEACHES_BASE_URL: http://speaches:8000
      LEADERBOARD_CSV: /app/results/leaderboard.csv
    volumes:
      - ./:/app
    depends_on:
      - speaches

  riva:
    profiles: ["riva"]
    image: nvcr.io/nim/nvidia/parakeet-1-1b-rnnt-multilingual:latest
    environment:
      NGC_API_KEY: ${NGC_API_KEY}
      NIM_HTTP_API_PORT: 9000
      NIM_GRPC_API_PORT: 50051
      NIM_TAGS_SELECTOR: ${NIM_TAGS_SELECTOR:-mode=ofl,diarizer=disabled}
    ports:
      - "${RIVA_HTTP_HOST_PORT:-9000}:9000"
      - "${RIVA_GRPC_HOST_PORT:-50051}:50051"
    gpus: all
    shm_size: 8GB

  riva-wrapper:
    profiles: ["riva"]
    build: .
    command:
      [
        "python",
        "scripts/riva_wrapper.py",
        "--listen-host",
        "0.0.0.0",
        "--listen-port",
        "8099",
        "--riva-url",
        "http://riva:9000",
        "--language",
        "ar",
        "--model",
        "parakeet-1-1b-rnnt-multilingual",
      ]
    environment:
      RIVA_AUTH_TOKEN: ${RIVA_AUTH_TOKEN:-}
      WRAPPER_AUTH_TOKEN: ${WRAPPER_AUTH_TOKEN:-}
    ports:
      - "${RIVA_WRAPPER_HOST_PORT:-8099}:8099"
    volumes:
      - ./:/app
    depends_on:
      - riva

  canary:
    profiles: ["canary"]
    image: nvcr.io/nim/nvidia/canary-1b:latest
    environment:
      NGC_API_KEY: ${NGC_API_KEY}
      NIM_HTTP_API_PORT: 9000
      NIM_GRPC_API_PORT: 50051
      NIM_TAGS_SELECTOR: ${NIM_TAGS_SELECTOR:-name=canary-1b}
      NVIDIA_VISIBLE_DEVICES: "1"
      CUDA_VISIBLE_DEVICES: "0"
    ports:
      - "${CANARY_HTTP_HOST_PORT:-9011}:9000"
      - "${CANARY_GRPC_HOST_PORT:-50052}:50051"
    runtime: nvidia
    shm_size: 8GB

  canary-wrapper:
    profiles: ["canary"]
    build: .
    command:
      [
        "python",
        "scripts/riva_wrapper.py",
        "--listen-host",
        "0.0.0.0",
        "--listen-port",
        "8099",
        "--riva-url",
        "http://canary:9000",
        "--language",
        "ar",
        "--model",
        "canary-1b",
      ]
    environment:
      RIVA_AUTH_TOKEN: ${RIVA_AUTH_TOKEN:-}
      WRAPPER_AUTH_TOKEN: ${WRAPPER_AUTH_TOKEN:-}
    ports:
      - "${CANARY_WRAPPER_HOST_PORT:-8098}:8099"
    volumes:
      - ./:/app
    depends_on:
      - canary

  qwen3-asr:
    profiles: ["qwen3-asr"]
    build:
      context: .
      dockerfile: Dockerfile.qwen3-asr
    command:
      [
        "qwen-asr-serve",
        "Qwen/Qwen3-ASR-1.7B",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--gpu-memory-utilization",
        "${QWEN3_GPU_MEMORY_UTIL:-0.8}",
        "--max-model-len",
        "${QWEN3_MAX_MODEL_LEN:-4096}",
      ]
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "${QWEN3_ASR_HOST_PORT:-9012}:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 8GB

  qwen3-asr-wrapper:
    profiles: ["qwen3-asr"]
    build: .
    command:
      [
        "python",
        "scripts/qwen3_wrapper.py",
        "--listen-host",
        "0.0.0.0",
        "--listen-port",
        "8099",
        "--qwen3-url",
        "http://qwen3-asr:8000",
        "--model",
        "Qwen/Qwen3-ASR-1.7B",
      ]
    environment:
      QWEN3_AUTH_TOKEN: ${QWEN3_AUTH_TOKEN:-}
      WRAPPER_AUTH_TOKEN: ${WRAPPER_AUTH_TOKEN:-}
    ports:
      - "${QWEN3_WRAPPER_HOST_PORT:-8097}:8099"
    volumes:
      - ./:/app
    depends_on:
      - qwen3-asr

  # KFUPM-JRCAI/WhisperLargeArabic - fine-tuned Whisper Large for Arabic
  whisper-large-arabic:
    profiles: ["whisper-large-arabic"]
    build:
      context: .
      dockerfile: Dockerfile.whisper-large-arabic
    command:
      [
        "python",
        "scripts/whisper_large_arabic_wrapper.py",
        "--listen-host",
        "0.0.0.0",
        "--listen-port",
        "8099",
        "--model",
        "KFUPM-JRCAI/WhisperLargeArabic",
        "--language",
        "ar",
      ]
    environment:
