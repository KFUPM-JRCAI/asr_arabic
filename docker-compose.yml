    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 8GB

  # KFUPM-JRCAI/WhisperArabic_v7 - fine-tuned Whisper Large v3 for Arabic (CTranslate2/faster-whisper)
  whisper-arabic-v7:
    profiles: ["whisper-arabic-v7"]
